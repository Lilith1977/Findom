<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistress Grace</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: radial-gradient(circle at top, #1a0033, black);
            color: white;
            text-align: center;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 60px;
            background: linear-gradient(45deg, gold, #ffcc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #d9aaff;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(45deg, purple, gold);
            border-radius: 30px;
            text-decoration: none;
            color: white;
            box-shadow: 0 0 15px purple;
        }
    </style>
</head>
<body>

<div class="hero">
    <h1>Mistress Grace</h1>
    <p>Dominanz. Kontrolle. Luxus.</p>
    <a href="#" class="btn">Enter</a>
</div>

</body>
</html>
