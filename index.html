<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mistress Grace</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: radial-gradient(circle at top, #1a0033, #000);
    color:white;
}

/* AGE GATE */
.age-gate {
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    flex-direction:column;
}

.age-box {
    text-align:center;
}

.age-box h1 {
    color:gold;
    font-size:50px;
}

.btn {
    padding:15px 40px;
    background: linear-gradient(45deg, purple, gold);
    border-radius:30px;
    text-decoration:none;
    color:white;
    box-shadow:0 0 20px purple;
    cursor:pointer;
}

/* HEADER */
.header {
    height:400px;
    background: url("https://images.unsplash.com/photo-1614850523459-c2f4c699c52d") center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.header h1 {
    font-size:70px;
    background: linear-gradient(45deg, gold, #ffcc00);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* SECTION */
.section {
    padding:60px 20px;
    text-align:center;
}

.section h2 {
    color:gold;
    font-size:40px;
}

/* GALLERY */
.gallery {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

.gallery img {
    width:100%;
    border-radius:10px;
    transition:0.3s;
}

.gallery img:hover {
    transform:scale(1.05);
}
</style>
</head>

<body>

<!-- AGE CHECK -->
<div class="age-gate" id="ageGate">
    <div class="age-box">
        <h1>18+</h1>
        <p>Diese Seite ist nur für Erwachsene</p>
        <button class="btn" onclick="enterSite()">Enter</button>
    </div>
</div>
<!-- BANNER -->
<section class="hero">
    <img src="Banner.png" alt="Mistress Grace Banner">
</section>
<!-- HEADER -->
<div class="header">
    <h1>Mistress Grace</h1>
</div>

<!-- CONTENT -->
<div class="section">
    <h2>Willkommen</h2>
    <p>Unterwirf dich dem Luxus.</p>
</div>

<div class="section">
    <h2>Galerie</h2>
    <div class="gallery">
        <img src="https://picsum.photos/400/500?1">
        <img src="https://picsum.photos/400/500?2">
        <img src="https://picsum.photos/400/500?3">
    </div>
</div>

<script>
function enterSite(){
    document.getElementById("ageGate").style.display="none";
}
</script>

</body>
</html>
